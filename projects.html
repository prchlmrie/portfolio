<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Featured Projects | Cheilou Marie Puro</title>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="js/theme.js"></script>
  <script src="js/tech-stack-data.js"></script>
  <script src="js/projects-data.js"></script>
  <script src="js/featured-projects-data.js"></script>
  <script src="js/projects-ui.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="css/theme.css" rel="stylesheet"/>
  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-mono-label { font-family: 'JetBrains Mono', monospace; }
    .hero-title { letter-spacing: -0.02em; }
    .bg-accent { background-color: #f472b6; }
    .text-accent { color: #f472b6; }
    .border-accent { border-color: #f472b6; }
    .hover\:bg-accent-hover:hover { background-color: #ec4899; }
    .hover\:border-accent:hover { border-color: #f472b6; }
    .hero-blob-primary { background: radial-gradient(circle, rgba(244, 114, 182, 0.22) 0%, transparent 70%); }
    .hero-blob-secondary { background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 70%); }
  </style>
</head>
<body class="bg-background text-on-surface selection:bg-pink-500/40 selection:text-white">

<header class="glass-nav fixed w-full z-50 px-6 py-4 md:px-10 lg:px-12 border-b border-outline-variant/70">
  <div class="max-w-[1120px] mx-auto grid grid-cols-[1fr_auto_1fr] items-center gap-4">
    <a href="index.html#home" class="flex items-center space-x-2 justify-self-start">
      <div class="w-8 h-8 bg-accent rounded-md flex items-center justify-center font-bold text-white">C</div>
      <span class="text-lg md:text-xl font-bold tracking-tight text-on-surface">CHEILOU</span>
    </a>

    <nav class="hidden md:flex items-center justify-center gap-6 lg:gap-8 justify-self-center" id="desktop-nav">
      <a class="nav-item text-on-surface-variant hover:text-accent transition-colors text-sm font-medium" href="index.html#home">Home</a>
      <a class="nav-item text-on-surface-variant hover:text-accent transition-colors text-sm font-medium" href="index.html#about">About Me</a>
      <a class="nav-item text-accent text-sm font-medium" href="projects.html" aria-current="page">Projects</a>
      <a class="nav-item text-on-surface-variant hover:text-accent transition-colors text-sm font-medium" href="blog.html">Blog</a>
      <a class="nav-item text-on-surface-variant hover:text-accent transition-colors text-sm font-medium" href="index.html#contact">Contact</a>
    </nav>

    <div class="flex items-center gap-3 justify-self-end">
      <a class="hidden sm:inline-flex border border-outline hover:border-accent text-on-surface-variant hover:text-accent transition-all px-5 py-2 rounded text-sm font-medium" href="images/CheilouPuro_CV.pdf" target="_blank" rel="noopener noreferrer" download>Download CV</a>
      <button type="button" id="menu-btn" class="md:hidden text-on-surface p-2" aria-label="Open menu">
        <span class="material-symbols-outlined">menu</span>
      </button>
    </div>
  </div>
</header>

<div id="mobile-menu" class="hidden fixed top-[72px] left-0 right-0 z-40 glass-nav border-b border-outline-variant/70 px-6 py-6 flex-col gap-4 md:hidden">
  <a class="mobile-nav text-on-surface-variant text-sm font-medium" href="index.html#home">Home</a>
  <a class="mobile-nav text-on-surface-variant text-sm font-medium" href="index.html#about">About Me</a>
  <a class="mobile-nav text-accent text-sm font-medium" href="projects.html" aria-current="page">Projects</a>
  <a class="mobile-nav text-on-surface-variant text-sm font-medium" href="blog.html">Blog</a>
  <a class="mobile-nav text-on-surface-variant text-sm font-medium" href="index.html#contact">Contact</a>
  <a class="border border-outline hover:border-accent px-5 py-2 rounded text-sm font-medium text-center text-on-surface-variant hover:text-accent" href="images/CheilouPuro_CV.pdf" target="_blank" rel="noopener noreferrer" download>Download CV</a>
</div>

<main class="hero-pattern relative overflow-hidden pt-14 md:pt-16">
  <div class="absolute top-28 -left-32 w-96 h-96 hero-blob-primary blur-3xl rounded-full pointer-events-none" aria-hidden="true"></div>
  <div class="absolute top-48 right-0 w-80 h-80 hero-blob-secondary blur-3xl rounded-full pointer-events-none" aria-hidden="true"></div>

  <section class="scroll-mt-20 py-12 md:py-16 bg-surface-container-low relative z-10">
    <div class="max-w-[1120px] mx-auto px-6 md:px-12">
      <div class="space-y-2 mb-8 md:mb-10 text-center">
        <p class="font-mono-label text-xs uppercase tracking-[0.2em] text-primary">Full Portfolio</p>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight hero-title">Featured Projects</h1>
        <p class="text-on-surface-variant max-w-2xl mx-auto text-sm md:text-base leading-relaxed">
          Template layout for three featured builds—swap in Hogwarts, Flyzona, and Pharmacy when you are ready.
        </p>
      </div>

      <div class="featured-projects-stage">
        <div id="featured-projects-list" class="featured-projects-list" aria-label="Featured projects"></div>
      </div>
    </div>
  </section>
</main>

<footer class="py-8 text-center text-on-surface-variant text-xs uppercase tracking-widest">
  <p>© 2024 Cheilou Marie Puro. Crafted with Precision.</p>
</footer>

<script>
  const menuBtn = document.getElementById('menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');

  if (menuBtn && mobileMenu) {
    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      mobileMenu.classList.toggle('flex');
    });
  }

  document.querySelectorAll('.mobile-nav').forEach((link) => {
    link.addEventListener('click', () => {
      if (!mobileMenu) return;
      mobileMenu.classList.add('hidden');
      mobileMenu.classList.remove('flex');
    });
  });

  if (window.ProjectsUI) {
    window.ProjectsUI.initCaseStudyModal();
    window.ProjectsUI.initFeaturedProjects('featured-projects-list');
  }

  if (window.location.search.includes('case-study=1') && window.location.hash) {
    const slug = window.location.hash.replace(/^#/, '').replace(/^project-/, '');
    if (window.ProjectsUI) {
      window.ProjectsUI.openCaseStudy(slug);
    }
  }
</script>
</body>
</html>
